name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read 

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend
        run: docker build -t frontend:latest ./app/frontend

      - name: Build backend
        run: docker build -t backend:latest ./app/backend

      # ---- Security scans (kept same) ----

      - name: push frontend
        run: |
          docker tag frontend:latest ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      - name: push backend
        run: |
          docker tag backend:latest ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

  # -----------------------------
  # TERRAFORM (RUNS ONLY ONCE)
  # -----------------------------
  infrastructure:
    name: Terraform
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::179832230574:role/oidc-3 
          aws-region: ap-south-1
      
      - name: Verify AWS Identity
        run: aws sts get-caller-identity    

      - name: Terraform Init
        run: terraform init
        working-directory: terraform-files
    
      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform-files
    
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        working-directory: terraform-files
    
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform-files

  # -----------------------------
  # DEPLOY (RUNS PER ENV)
  # -----------------------------
  deploy:
    name: Deploy
    needs: infrastructure
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: [dev, staging]

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::179832230574:role/oidc-3
          aws-region: ap-south-1

      - name: Setup Terraform (for outputs)
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init (for outputs)
        run: terraform init
        working-directory: terraform-files

      - name: Terraform Refresh State
        run: terraform refresh
        working-directory: terraform-files

      - name: Get Terraform Outputs
        id: tf_outputs
        run: |
         ENV=${{ matrix.environment }}

         FRONTEND_IP=$(terraform output -json frontend_ips | jq -r ".[$ENV]")
         BACKEND_IP=$(terraform output -json backend_ips | jq -r ".[$ENV]")

         echo "frontend_ip=$FRONTEND_IP" >> $GITHUB_OUTPUT   
         echo "backend_ip=$BACKEND_IP" >> $GITHUB_OUTPUT
        working-directory: terraform-files

      # -----------------------------
      # DEPLOY BACKEND (via bastion)
      # -----------------------------
      - name: Deploy Backend via Bastion
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ steps.tf_outputs.outputs.backend_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          proxy_host: ${{ steps.tf_outputs.outputs.frontend_ip }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            sudo systemctl start docker
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest
            sudo docker stop backend || true
            sudo docker rm backend || true
            sudo docker run -d -p 5000:5000 --name backend ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # -----------------------------
      # DEPLOY FRONTEND
      # -----------------------------
      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ steps.tf_outputs.outputs.frontend_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            sudo systemctl start docker || true
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/frontend:latest
            sudo docker stop frontend || true
            sudo docker rm frontend || true
            sudo docker run -d -p 80:80 \
              -e BACKEND_URL=http://${{ steps.tf_outputs.outputs.backend_ip }}:5000/api/data \
              --name frontend \
              ${{ secrets.DOCKER_USERNAME }}/frontend:latest