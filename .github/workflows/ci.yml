name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read 

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend
        run: docker build -t frontend:latest ./app/frontend

      - name: Build backend
        run: docker build -t backend:latest ./app/backend

      # ---- Security scans (kept same) ----

      - name: push frontend
        run: |
          docker tag frontend:latest ${{ secrets.DOCKER_USERNAME }}/frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest

      - name: push backend
        run: |
          docker tag backend:latest ${{ secrets.DOCKER_USERNAME }}/backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest
  # -----------------------------
# 2. CORE INFRA (NO MATRIX)
# -----------------------------
  core:
    name: Core Infrastructure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::179832230574:role/oidc-3
          aws-region: ap-south-1

      - name: Terraform Init (CORE)
        run: terraform init -backend-config="key=core/terraform.tfstate" -reconfigure
        working-directory: terraform-files/core

      - name: Terraform Apply (CORE)
        run: terraform apply -auto-approve
        working-directory: terraform-files/core

# -----------------------------
# 3. COMPUTE INFRA (MATRIX)
# -----------------------------
  compute:
    name: Compute Infrastructure
    runs-on: ubuntu-latest
    needs: core

    strategy:
      matrix:
        environment: [dev, staging]
      max-parallel: 1 
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::179832230574:role/oidc-3
          aws-region: ap-south-1

      - name: Terraform Init (ENV)
        run: terraform init -backend-config="key=${{ matrix.environment }}/terraform.tfstate" -reconfigure
        working-directory: terraform-files/compute

      - name: Terraform Apply (ENV)
        run: terraform apply -auto-approve
        working-directory: terraform-files/compute
        env:
          TF_VAR_environment: ${{ matrix.environment }}

# -----------------------------
# 4. DEPLOY (MATRIX)
# -----------------------------
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: compute

    strategy:
      matrix:
        environment: [dev, staging]
      

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::179832230574:role/oidc-3
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ matrix.environment }}/terraform.tfstate" -reconfigure
        working-directory: terraform-files/compute

      - name: Get Outputs (Safe Final)
        id: tf_outputs
        run: |
          FRONTEND_IP=$(terraform output -raw frontend_ip)
          BACKEND_IP=$(terraform output -raw backend_ip)
          echo "frontend_ip=$FRONTEND_IP" >> $GITHUB_OUTPUT
          echo "backend_ip=$BACKEND_IP" >> $GITHUB_OUTPUT
        working-directory: terraform-files/compute

      # -----------------------------
      # BACKEND DEPLOY (via bastion)
      # -----------------------------
      - name: Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.tf_outputs.outputs.backend_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          proxy_host: ${{ steps.tf_outputs.outputs.frontend_ip }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            sudo systemctl start docker || true
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/backend:latest
            sudo docker stop backend || true
            sudo docker rm backend || true
            sudo docker run -d -p 5000:5000 \
              --restart unless-stopped \
              --name backend \
              ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # -----------------------------
      # FRONTEND DEPLOY
      # -----------------------------
      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.tf_outputs.outputs.frontend_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            sudo systemctl start docker || true
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/frontend:latest
            sudo docker stop frontend || true
            sudo docker rm frontend || true
            sudo docker run -d -p 80:80 \
              --restart unless-stopped \
              -e BACKEND_URL=http://${{ steps.tf_outputs.outputs.backend_ip }}:5000/api/data \
              --name frontend \
              ${{ secrets.DOCKER_USERNAME }}/frontend:latest